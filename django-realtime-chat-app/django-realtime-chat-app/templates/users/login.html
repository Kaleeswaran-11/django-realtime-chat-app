{% extends 'base/base.html' %}
{% block title %}Login | RealtimeChat{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-3 text-center">Welcome Back</h2>
                <p class="text-muted text-center">Login to continue chatting in real time.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="mt-3 text-center mb-0">New user? <a href="{% url 'users:register' %}">Create an account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
