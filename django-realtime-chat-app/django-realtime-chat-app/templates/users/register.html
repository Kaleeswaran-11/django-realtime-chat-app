{% extends 'base/base.html' %}
{% block title %}Register | RealtimeChat{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-3 text-center">Create Account</h2>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors|join:', ' }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <p class="mt-3 text-center mb-0">Already registered? <a href="{% url 'users:login' %}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
